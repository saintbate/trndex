name: Collect Trends

on:
  schedule:
    # Every 2 hours (matches collector POLL_INTERVAL)
    - cron: "0 */2 * * *"
  workflow_dispatch: # Allow manual run from Actions tab

permissions:
  contents: read

concurrency:
  group: collect-trends
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python collectors
        run: python -m py_compile collector.py market_collector.py gt_collector.py daily_rollup.py ops_health.py

      - name: Run collector
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python collector.py --once

      - name: Verify collector freshness
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ops_health.py --check collector
