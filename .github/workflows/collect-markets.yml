name: Collect Markets

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python market_collector.py --once
