name: Collect Markets

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collect-markets
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python collectors
        run: python -m py_compile collector.py market_collector.py gt_collector.py daily_rollup.py ops_health.py

      - name: Run market collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python market_collector.py --once

      - name: Verify market freshness
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ops_health.py --check markets
